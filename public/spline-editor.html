<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spline Editor — Cinematic Timeline</title>
  <meta name="description" content="Futuristic cinematic spline graph timeline editor with neon aesthetics and motion-graphics inspired UI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #07070b;
      --bdr2: rgba(255,255,255,0.09);

      --purple: #c24dff;
      --cyan: #00e5ff;
      --ylw: #b8cc44;

      --t1: rgba(255,255,255,0.88);
      --t2: rgba(255,255,255,0.48);
      --t3: rgba(255,255,255,0.22);

      --mono: 'JetBrains Mono', 'Cascadia Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--t1); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.07); border-radius:4px; }

    /* ── LAYOUT ── */
    #app { display:flex; flex-direction:column; width:100vw; height:100vh; }
    .main-row { display:flex; flex:1; min-height:0; }

    /* ── GRAPH ── */
    .gfx {
      flex:1; position:relative; overflow:hidden; background:var(--bg);
      cursor:crosshair;
    }

    /* Vertical streaks */
    .gfx-streaks {
      position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        linear-gradient(90deg,
          transparent 9%, rgba(194,77,255,0.012) 11.5%, transparent 14%,
          transparent 28%, rgba(0,229,255,0.007) 30%, transparent 32%,
          transparent 46%, rgba(184,204,68,0.005) 48%, transparent 50%,
          transparent 64%, rgba(194,77,255,0.006) 66%, transparent 68%,
          transparent 82%, rgba(0,229,255,0.005) 84%, transparent 86%
        );
    }

    /* Vignette */
    .gfx-vig {
      position:absolute; inset:0; pointer-events:none; z-index:8;
      background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%);
    }

    canvas { position:absolute; inset:0; }
    #cv-part { z-index:1; pointer-events:none; }
    #cv-glow { z-index:3; pointer-events:none; }
    #cv-main { z-index:2; }

    /* Scanline */
    .scan { position:absolute; inset:0; pointer-events:none; z-index:4; overflow:hidden; }
    .scan::before {
      content:''; position:absolute; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent 10%, rgba(194,77,255,0.04) 50%, transparent 90%);
      animation:scanmv 12s linear infinite;
    }
    @keyframes scanmv { 0%{top:-1px} 100%{top:100%} }

    /* Second scanline (slower, cyan) */
    .scan::after {
      content:''; position:absolute; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent 15%, rgba(0,229,255,0.025) 50%, transparent 85%);
      animation:scanmv 18s linear infinite 4s;
    }

    /* Progress line (CSS) */
    .prog {
      position:absolute; top:0; bottom:0; width:1px; z-index:6; pointer-events:none;
    }
    .prog-dash {
      position:absolute; inset:0;
      background:repeating-linear-gradient(to bottom, var(--purple) 0 3.5px, transparent 3.5px 8px);
      opacity:.45;
    }
    .prog-bloom {
      position:absolute; inset:-4px;
      background:repeating-linear-gradient(to bottom, rgba(194,77,255,0.1) 0 3.5px, transparent 3.5px 8px);
      filter:blur(6px);
    }
    .prog-tag {
      position:absolute; top:5px; left:50%; transform:translateX(-50%);
      background:var(--purple); color:#fff; font-family:var(--mono);
      font-size:8px; font-weight:600; padding:1.5px 5px; border-radius:2.5px;
      box-shadow:0 0 8px rgba(194,77,255,0.55), 0 0 22px rgba(194,77,255,0.12);
      letter-spacing:.6px; white-space:nowrap;
    }

    /* Endpoint orb */
    .end-orb {
      position:absolute; width:16px; height:16px; border-radius:50%;
      background:radial-gradient(circle, #fff 0%, #d080ff 30%, var(--purple) 60%, transparent 100%);
      z-index:6; pointer-events:none;
      box-shadow:0 0 6px rgba(194,77,255,0.5);
    }
    .end-orb::before {
      content:''; position:absolute; inset:-12px; border-radius:50%;
      background:radial-gradient(circle, rgba(194,77,255,0.28), transparent 60%);
      animation:orbp 2.8s ease-in-out infinite;
    }
    .end-orb::after {
      content:''; position:absolute; inset:-28px; border-radius:50%;
      background:radial-gradient(circle, rgba(194,77,255,0.06), transparent 50%);
      animation:orbp 2.8s ease-in-out infinite .5s;
    }
    @keyframes orbp { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.35} }

    /* Y labels */
    .y-ax { position:absolute; left:0; top:0; bottom:0; width:44px; z-index:9; pointer-events:none; }
    .y-l { position:absolute; right:7px; font-family:var(--mono); font-size:8.5px; color:var(--t3); transform:translateY(-50%); }

    /* Tooltip */
    .ttip {
      position:absolute; background:rgba(12,12,18,0.96); border:1px solid var(--bdr2); border-radius:5px;
      padding:6px 10px; font-family:var(--mono); font-size:10px; color:var(--t1);
      pointer-events:none; z-index:25; display:none;
      box-shadow:0 6px 24px rgba(0,0,0,0.6), 0 0 1px rgba(194,77,255,0.3);
      backdrop-filter:blur(10px); white-space:nowrap;
    }
    .ttip.vis { display:block; }
    .ttip-h { color:var(--t2); font-size:7.5px; margin-bottom:2px; letter-spacing:.8px; text-transform:uppercase; }
    .ttip-r { display:flex; gap:12px; }
    .ttip-k { color:var(--t3); }

    /* Crosshair readout */
    .readout {
      position:absolute; bottom:8px; right:8px;
      font-family:var(--mono); font-size:8.5px; color:var(--t3);
      z-index:9; pointer-events:none; letter-spacing:.3px;
      text-shadow:0 0 8px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="main-row">
    <!-- Graph viewport -->
    <div class="gfx" id="gfx">
      <div class="gfx-streaks"></div>
      <canvas id="cv-part"></canvas>
      <canvas id="cv-main"></canvas>
      <canvas id="cv-glow"></canvas>
      <div class="scan"></div>
      <div class="gfx-vig"></div>

      <div class="y-ax" id="yax"></div>

      <div class="prog" id="prog">
        <div class="prog-bloom"></div>
        <div class="prog-dash"></div>
        <div class="prog-tag">100%</div>
      </div>

      <div class="end-orb" id="orb"></div>

      <div class="ttip" id="ttip">
        <div class="ttip-h">Keyframe</div>
        <div class="ttip-r">
          <span><span class="ttip-k">T </span><span id="tv-t">0.00</span></span>
          <span><span class="ttip-k">V </span><span id="tv-v">0.00</span></span>
        </div>
      </div>

      <div class="readout" id="readout"></div>
    </div>
  </div>
</div>
<script>
(() => {
  /* ════════════════════════════════════════════════
     DATA
  ════════════════════════════════════════════════ */
  const TL = ['0:05','0:10','0:15','0:20','0:25','1:00','1:05','1:10','1:15','1:20','1:25','2:00'];
  const YR = { lo:.8, hi:3.2 }, YS = .2;

  // Spline keyframe data – purple (main), cyan, yellow-green
  const PD = [
    {t:.02,v:3.15},{t:.07,v:2.88},{t:.13,v:2.65},{t:.21,v:2.35},{t:.30,v:2.18},
    {t:.40,v:2.05},{t:.50,v:1.82},{t:.60,v:1.72},{t:.70,v:1.55},{t:.78,v:1.38},
    {t:.86,v:1.18},{t:.93,v:1.05},{t:1.0,v:.88}
  ];
  const CD = [
    {t:.0,v:1.82},{t:.07,v:1.90},{t:.14,v:1.96},{t:.22,v:1.99},{t:.32,v:1.96},
    {t:.42,v:1.90},{t:.52,v:1.80},{t:.62,v:1.62},{t:.72,v:1.48},{t:.82,v:1.36},
    {t:.91,v:1.22},{t:.97,v:1.14},{t:1.0,v:1.10}
  ];
  const YD = [
    {t:.0,v:1.42},{t:.09,v:1.46},{t:.18,v:1.48},{t:.28,v:1.46},{t:.38,v:1.42},
    {t:.48,v:1.38},{t:.58,v:1.34},{t:.68,v:1.30},{t:.78,v:1.26},{t:.88,v:1.22},
    {t:.95,v:1.18},{t:1.0,v:1.14}
  ];

  /* ════════════════════════════════════════════════
     CANVAS SETUP
  ════════════════════════════════════════════════ */
  const gfx  = document.getElementById('gfx');
  const cvM  = document.getElementById('cv-main');
  const cvG  = document.getElementById('cv-glow');
  const cvP  = document.getElementById('cv-part');
  const ctxM = cvM.getContext('2d');
  const ctxG = cvG.getContext('2d');
  const ctxP = cvP.getContext('2d');

  let W, H, dpr;
  const P = { t:42, r:52, b:30, l:50 }; // padding

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = gfx.clientWidth; H = gfx.clientHeight;
    [cvM, cvG, cvP].forEach(cv => {
      cv.width = W*dpr; cv.height = H*dpr;
      cv.style.width = W+'px'; cv.style.height = H+'px';
    });
    ctxM.setTransform(dpr,0,0,dpr,0,0);
    ctxG.setTransform(dpr,0,0,dpr,0,0);
    ctxP.setTransform(dpr,0,0,dpr,0,0);
    buildY(); posUI(); initParts();
  }

  const tx = t => P.l + t*(W - P.l - P.r);
  const ty = v => H - P.b - ((v - YR.lo)/(YR.hi - YR.lo))*(H - P.t - P.b);
  const xtot = x => (x - P.l)/(W - P.l - P.r);
  const ytov = y => YR.lo + ((H - P.b - y)/(H - P.t - P.b))*(YR.hi - YR.lo);

  function buildY() {
    const el = document.getElementById('yax'); el.innerHTML = '';
    for (let v = YR.lo; v <= YR.hi+.001; v += YS) {
      const s = document.createElement('span'); s.className='y-l'; s.style.top=ty(v)+'px';
      s.textContent = v.toFixed(1); el.appendChild(s);
    }
  }

  function posUI() {
    const prog = document.getElementById('prog');
    prog.style.left = tx(.96)+'px';
    const orb = document.getElementById('orb');
    const lp = PD[PD.length-1];
    orb.style.left = (tx(lp.t)-8)+'px';
    orb.style.top  = (ty(lp.v)-8)+'px';
  }

  /* ════════════════════════════════════════════════
     SPLINE MATH (Catmull-Rom → Cubic Bézier)
  ════════════════════════════════════════════════ */
  function buildSegs(pts) {
    const s = [];
    for (let i=0; i<pts.length-1; i++) {
      const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      s.push({
        x0:tx(p1.t), y0:ty(p1.v),
        cx1:tx(p1.t)+(tx(p2.t)-tx(p0.t))/6, cy1:ty(p1.v)+(ty(p2.v)-ty(p0.v))/6,
        cx2:tx(p2.t)-(tx(p3.t)-tx(p1.t))/6, cy2:ty(p2.v)-(ty(p3.v)-ty(p1.v))/6,
        x1:tx(p2.t), y1:ty(p2.v)
      });
    }
    return s;
  }

  function tracePath(ctx, segs, pr) {
    if(!segs.length) return;
    ctx.beginPath(); ctx.moveTo(segs[0].x0, segs[0].y0);
    const n=Math.floor(segs.length*pr), fr=segs.length*pr-n;
    for(let i=0;i<n&&i<segs.length;i++){ const s=segs[i]; ctx.bezierCurveTo(s.cx1,s.cy1,s.cx2,s.cy2,s.x1,s.y1); }
    if(n<segs.length&&fr>0){
      const s=segs[n], f=fr;
      const ex=s.x0*(1-f)**3+3*s.cx1*(1-f)**2*f+3*s.cx2*(1-f)*f*f+s.x1*f**3;
      const ey=s.y0*(1-f)**3+3*s.cy1*(1-f)**2*f+3*s.cy2*(1-f)*f*f+s.y1*f**3;
      const c1x=s.x0+(s.cx1-s.x0)*f, c1y=s.y0+(s.cy1-s.y0)*f;
      const mmx=s.cx1+(s.cx2-s.cx1)*f, mmy=s.cy1+(s.cy2-s.cy1)*f;
      ctx.bezierCurveTo(c1x,c1y, c1x+(mmx-c1x)*f, c1y+(mmy-c1y)*f, ex,ey);
    }
  }

  /* ════════════════════════════════════════════════
     PARTICLES
  ════════════════════════════════════════════════ */
  const parts = [];
  function initParts() {
    parts.length = 0;
    for(let i=0;i<40;i++){
      parts.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-.5)*.1, vy:(Math.random()-.5)*.06,
        r:Math.random()*.9+.2, a:Math.random()*.1+.015,
        c:['194,77,255','0,229,255','184,204,68'][~~(Math.random()*3)]
      });
    }
  }
  function tickParts() {
    ctxP.clearRect(0,0,W,H);
    parts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctxP.beginPath(); ctxP.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctxP.fillStyle=`rgba(${p.c},${p.a})`; ctxP.fill();
    });
  }

  /* ════════════════════════════════════════════════
     INTERACTION
  ════════════════════════════════════════════════ */
  let mx=-200, my=-200;
  let dragging = null; // { arr, idx }
  let hov = null;

  gfx.addEventListener('mousemove', e => {
    const r = gfx.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
    if (dragging) {
      const arr = dragging.arr, idx = dragging.idx;
      let nt = Math.max(0, Math.min(1, xtot(mx)));
      let nv = Math.max(YR.lo, Math.min(YR.hi, ytov(my)));
      // clamp between neighbors
      if (idx > 0) nt = Math.max(arr[idx-1].t + .005, nt);
      if (idx < arr.length-1) nt = Math.min(arr[idx+1].t - .005, nt);
      arr[idx].t = nt; arr[idx].v = nv;
      posUI();
    }
  });
  gfx.addEventListener('mouseleave', () => { mx=my=-200; });
  gfx.addEventListener('mousedown', e => {
    if (hov) { dragging = { arr: hov.arr, idx: hov.idx }; e.preventDefault(); }
  });
  window.addEventListener('mouseup', () => { dragging = null; });

  /* ════════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════════ */
  let t0 = performance.now();
  const ease = x => 1 - (1-x)**4;
  const readoutEl = document.getElementById('readout');

  function frame(now) {
    const pr = ease(Math.min(1, (now-t0)/2400));
    ctxM.clearRect(0,0,W,H);
    ctxG.clearRect(0,0,W,H);

    /* ─── Grid ─── */
    ctxM.save();
    // horizontal
    for(let v=YR.lo; v<=YR.hi+.001; v+=YS){
      const y = ty(v);
      ctxM.beginPath(); ctxM.moveTo(P.l, y); ctxM.lineTo(W-P.r, y);
      ctxM.strokeStyle = (Math.abs(v - Math.round(v)) < .01) ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.025)';
      ctxM.lineWidth = .5; ctxM.stroke();
    }
    // vertical
    TL.forEach((_,i) => {
      const x = tx(i/(TL.length-1));
      ctxM.beginPath(); ctxM.moveTo(x, P.t); ctxM.lineTo(x, H-P.b);
      ctxM.strokeStyle = 'rgba(255,255,255,0.025)'; ctxM.lineWidth = .5; ctxM.stroke();
    });
    ctxM.restore();

    /* ─── Time labels ─── */
    ctxM.save();
    ctxM.font = '500 9px "JetBrains Mono", monospace';
    ctxM.fillStyle = 'rgba(255,255,255,0.28)';
    ctxM.textAlign = 'center';
    TL.forEach((lbl,i) => {
      const x = tx(i/(TL.length-1));
      ctxM.fillText(lbl, x, P.t-12);
      ctxM.beginPath(); ctxM.moveTo(x, P.t-4); ctxM.lineTo(x, P.t);
      ctxM.strokeStyle = 'rgba(255,255,255,0.08)'; ctxM.lineWidth = .6; ctxM.stroke();
    });
    ctxM.restore();

    /* ─── Crosshair ─── */
    if (mx > P.l && mx < W-P.r && my > P.t && my < H-P.b && !dragging) {
      ctxM.save();
      ctxM.setLineDash([3,5]);
      // vertical
      ctxM.beginPath(); ctxM.moveTo(mx, P.t); ctxM.lineTo(mx, H-P.b);
      ctxM.strokeStyle = 'rgba(255,255,255,0.06)'; ctxM.lineWidth = .5; ctxM.stroke();
      // horizontal
      ctxM.beginPath(); ctxM.moveTo(P.l, my); ctxM.lineTo(W-P.r, my);
      ctxM.strokeStyle = 'rgba(255,255,255,0.06)'; ctxM.lineWidth = .5; ctxM.stroke();
      ctxM.setLineDash([]);
      ctxM.restore();
      const ct = xtot(mx), cv = ytov(my);
      readoutEl.textContent = `T ${Math.max(0,ct).toFixed(3)}  V ${cv.toFixed(2)}`;
    } else {
      readoutEl.textContent = '';
    }

    hov = null;

    /* ═══ DRAW SPLINES ═══ */

    // ── Yellow-green (area fill + line) ──
    const ys = buildSegs(YD);
    // Faint area fill
    ctxM.save();
    tracePath(ctxM, ys, pr);
    ctxM.lineTo(tx(YD[YD.length-1].t * pr), H-P.b);
    ctxM.lineTo(tx(0), H-P.b);
    ctxM.closePath();
    const yGrad = ctxM.createLinearGradient(0, ty(1.5), 0, H-P.b);
    yGrad.addColorStop(0, 'rgba(184,204,68,0.03)');
    yGrad.addColorStop(1, 'transparent');
    ctxM.fillStyle = yGrad; ctxM.fill();
    ctxM.restore();
    // Glow
    ctxG.save(); tracePath(ctxG, ys, pr);
    ctxG.strokeStyle='rgba(184,204,68,0.05)'; ctxG.lineWidth=5; ctxG.filter='blur(5px)'; ctxG.stroke(); ctxG.restore();
    // Line
    ctxM.save(); tracePath(ctxM, ys, pr);
    ctxM.strokeStyle='rgba(184,204,68,0.42)'; ctxM.lineWidth=1.2; ctxM.lineCap='round'; ctxM.stroke(); ctxM.restore();

    // ── Cyan (area fill + line) ──
    const cs = buildSegs(CD);
    // Area fill
    ctxM.save();
    tracePath(ctxM, cs, pr);
    ctxM.lineTo(tx(CD[CD.length-1].t * pr), H-P.b);
    ctxM.lineTo(tx(0), H-P.b);
    ctxM.closePath();
    const cGrad = ctxM.createLinearGradient(0, ty(2), 0, H-P.b);
    cGrad.addColorStop(0, 'rgba(0,229,255,0.04)');
    cGrad.addColorStop(1, 'transparent');
    ctxM.fillStyle = cGrad; ctxM.fill();
    ctxM.restore();
    // Bloom
    ctxG.save(); tracePath(ctxG, cs, pr);
    ctxG.strokeStyle='rgba(0,229,255,0.07)'; ctxG.lineWidth=10; ctxG.filter='blur(8px)'; ctxG.stroke(); ctxG.restore();
    // Glow
    ctxG.save(); tracePath(ctxG, cs, pr);
    ctxG.strokeStyle='rgba(0,229,255,0.12)'; ctxG.lineWidth=4; ctxG.filter='blur(3px)'; ctxG.stroke(); ctxG.restore();
    // Line
    ctxM.save(); tracePath(ctxM, cs, pr);
    ctxM.strokeStyle='rgba(0,229,255,0.78)'; ctxM.lineWidth=1.7; ctxM.lineCap='round'; ctxM.stroke(); ctxM.restore();

    // ── Purple (main, area fill + bloom + glow + line + points) ──
    const ps = buildSegs(PD);
    // Area fill
    ctxM.save();
    tracePath(ctxM, ps, pr);
    ctxM.lineTo(tx(PD[PD.length-1].t * pr), H-P.b);
    ctxM.lineTo(tx(PD[0].t), H-P.b);
    ctxM.closePath();
    const pGrad = ctxM.createLinearGradient(0, ty(3.2), 0, H-P.b);
    pGrad.addColorStop(0, 'rgba(194,77,255,0.06)');
    pGrad.addColorStop(.6, 'rgba(194,77,255,0.02)');
    pGrad.addColorStop(1, 'transparent');
    ctxM.fillStyle = pGrad; ctxM.fill();
    ctxM.restore();

    // Wide bloom
    ctxG.save(); tracePath(ctxG, ps, pr);
    ctxG.strokeStyle='rgba(194,77,255,0.06)'; ctxG.lineWidth=28; ctxG.filter='blur(16px)'; ctxG.stroke(); ctxG.restore();
    // Mid glow
    ctxG.save(); tracePath(ctxG, ps, pr);
    ctxG.strokeStyle='rgba(194,77,255,0.18)'; ctxG.lineWidth=8; ctxG.filter='blur(5px)'; ctxG.stroke(); ctxG.restore();
    // Tight glow
    ctxG.save(); tracePath(ctxG, ps, pr);
    ctxG.strokeStyle='rgba(194,77,255,0.3)'; ctxG.lineWidth=4; ctxG.filter='blur(2px)'; ctxG.stroke(); ctxG.restore();
    // Main line
    ctxM.save(); tracePath(ctxM, ps, pr);
    ctxM.strokeStyle='#c24dff'; ctxM.lineWidth=2.3; ctxM.lineCap='round'; ctxM.lineJoin='round'; ctxM.stroke(); ctxM.restore();

    /* ─── Control points (purple) ─── */
    if (pr >= 1) {
      PD.forEach((pt, i) => {
        const x = tx(pt.t), y = ty(pt.v);
        const d = Math.sqrt((mx-x)**2+(my-y)**2);
        const hot = d < 18;
        const isDrag = dragging && dragging.arr === PD && dragging.idx === i;

        if (hot && !hov) hov = { x, y, v:pt.v, t:pt.t, arr:PD, idx:i };

        // Ambient glow
        const gr = isDrag ? 28 : hot ? 22 : 13;
        const g = ctxM.createRadialGradient(x,y,0,x,y,gr);
        g.addColorStop(0, isDrag?'rgba(194,77,255,0.5)':hot?'rgba(194,77,255,0.35)':'rgba(194,77,255,0.12)');
        g.addColorStop(1, 'transparent');
        ctxM.fillStyle = g; ctxM.fillRect(x-gr, y-gr, gr*2, gr*2);

        // Outer ring
        ctxM.beginPath(); ctxM.arc(x, y, isDrag?10:hot?8.5:6, 0, Math.PI*2);
        ctxM.strokeStyle = isDrag?'rgba(255,255,255,0.55)':hot?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.1)';
        ctxM.lineWidth = isDrag?1.8:hot?1.4:.6; ctxM.stroke();

        // Fill
        ctxM.beginPath(); ctxM.arc(x, y, isDrag?5.5:hot?4.8:3.5, 0, Math.PI*2);
        ctxM.fillStyle = isDrag||hot?'#fff':'#c24dff'; ctxM.fill();

        // Core
        ctxM.beginPath(); ctxM.arc(x, y, isDrag?2.5:hot?2:1.3, 0, Math.PI*2);
        ctxM.fillStyle = isDrag?'#c24dff':'#fff'; ctxM.fill();
      });
    }

    /* ─── Tooltip ─── */
    const ttip = document.getElementById('ttip');
    if (hov) {
      ttip.classList.add('vis');
      document.getElementById('tv-t').textContent = hov.t.toFixed(3);
      document.getElementById('tv-v').textContent = hov.v.toFixed(2);
      let tipX = hov.x + 18, tipY = hov.y - 24;
      if (tipX + 130 > W) tipX = hov.x - 140;
      if (tipY < 10) tipY = hov.y + 18;
      ttip.style.left = tipX+'px'; ttip.style.top = tipY+'px';
    } else {
      ttip.classList.remove('vis');
    }

    tickParts();
    requestAnimationFrame(frame);
  }

  /* ════════════════════════════════════════════════
     INIT
  ════════════════════════════════════════════════ */
  window.addEventListener('resize', resize);
  resize();
  t0 = performance.now();
  requestAnimationFrame(frame);
})();
</script>
